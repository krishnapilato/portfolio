spring:
  datasource:
    url: jdbc:h2:mem:portfolio;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  mail:
    host: localhost

management:
  health:
    mail:
      enabled: false

app:
  password-reset:
    expiration-hours: 1
